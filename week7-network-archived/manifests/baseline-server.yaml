---
# Baseline HTTP Server (no sidecar)
# Used as control group for latency comparison

apiVersion: v1
kind: Pod
metadata:
  name: baseline-server
  labels:
    app: baseline-server
spec:
  containers:
  - name: server
    image: nginx:alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        cpu: "5m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "128Mi"
    # Custom nginx config for logging latency
    volumeMounts:
    - name: nginx-config
      mountPath: /etc/nginx/conf.d/default.conf
      subPath: default.conf
  volumes:
  - name: nginx-config
    configMap:
      name: baseline-nginx-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: baseline-nginx-config
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        
        # Return a small response quickly
        location / {
            return 200 'OK\n';
            add_header Content-Type text/plain;
        }
        
        # Slightly larger response for testing
        location /data {
            return 200 '{"status":"ok","timestamp":"$time_iso8601","server":"baseline"}\n';
            add_header Content-Type application/json;
        }
        
        # Health check endpoint
        location /health {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: baseline-server
spec:
  selector:
    app: baseline-server
  ports:
  - port: 80
    targetPort: 80
