---
# HTTP Server with Envoy Sidecar
# Used to measure sidecar latency overhead

apiVersion: v1
kind: Pod
metadata:
  name: sidecar-server
  labels:
    app: sidecar-server
spec:
  containers:
  # Main application container
  - name: server
    image: nginx:alpine
    ports:
    - containerPort: 8080  # Backend port (changed to avoid conflict)
    resources:
      requests:
        cpu: "10m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "128Mi"
    volumeMounts:
    - name: nginx-config
      mountPath: /etc/nginx/conf.d/default.conf
      subPath: default.conf
  
  # Envoy sidecar container
  - name: envoy
    image: envoyproxy/envoy:v1.28-latest
    ports:
    - containerPort: 80    # Envoy listens on 80, forwards to 8080
    - containerPort: 15000 # Envoy admin
    resources:
      requests:
        cpu: "10m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    volumeMounts:
    - name: envoy-config
      mountPath: /etc/envoy/envoy.yaml
      subPath: envoy.yaml
    command: ["envoy"]
    args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warn"]
  
  volumes:
  - name: nginx-config
    configMap:
      name: sidecar-nginx-config
  - name: envoy-config
    configMap:
      name: envoy-sidecar-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sidecar-nginx-config
data:
  default.conf: |
    server {
        listen 8080;  # Backend listens on 8080
        server_name localhost;
        
        location / {
            return 200 'OK\n';
            add_header Content-Type text/plain;
        }
        
        location /data {
            return 200 '{"status":"ok","timestamp":"$time_iso8601","server":"sidecar"}\n';
            add_header Content-Type application/json;
        }
        
        location /health {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-sidecar-config
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 15000
    
    static_resources:
      listeners:
      - name: inbound_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 80
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: backend
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: local_backend
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      
      clusters:
      - name: local_backend
        type: STATIC
        connect_timeout: 1s
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: local_backend
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: sidecar-server
spec:
  selector:
    app: sidecar-server
  ports:
  - name: http
    port: 80
    targetPort: 80  # Goes to Envoy, which forwards to 8080
  - name: admin
    port: 15000
    targetPort: 15000
